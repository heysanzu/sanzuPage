<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Sanzu</title>
  <link rel="icon" type="image/png" href="sanzu.png">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    @font-face {
    font-family: 'SanzuFont'; 
    src: url('fonts/comic_sans_regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
    }   
    body {
      background: #ffffff;
      font-family: 'SanzuFont', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      color: #000000;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    
    header {
      background: #000000;
      color: #ffffff;
      padding: 1rem 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .site-name {
      font-size: 2rem;
      font-weight: 600;
    }

    .header-icon a {
      color: #ffffff;            
      font-size: 2.2rem;
      transition: color 0.2s;    
    }

    .header-icon a:hover {
      color: #cfcfcf;
    }

    
    main {
      flex: 1;
      max-width: 960px;
      margin: 2rem auto 3rem;
      padding: 0 2rem;
      width: 100%;
    }

    
    .hero {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /*custom logo*/
    .hero-icon {
      width: 5rem;
      height: auto;
      margin-bottom: 0.5rem;
      border-radius: 15px;
      display: inline-block;
    }

    h1 {
      font-size: 3rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .tagline {
      font-size: 1.2rem;
      color: #4b5563;
      margin-bottom: 2rem;
    }

    
    .download-card {
      background: #ffffff;
      border: 2px solid #e6e6e6;
      border-radius: 32px;
      padding: 2rem 2rem 2.2rem;
      text-align: center;
      max-width: 520px;
      margin: 0 auto 2.5rem;
    }

    .version-info {
      color: #6b7280;
      font-size: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .version-info i {
      color: #6b7280;
    }

    .free-badge {
      background: #000000;
      color: #ffffff;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: normal;
    }

    
    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #000000;
      color: #ffffff;
      font-family: inherit;
      font-size: 1.4rem;
      font-weight: 500;
      padding: 1rem 2.8rem;
      border-radius: 60px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .download-btn i {
      color: #b0b7c0;
      font-size: 1.4rem;
      transition: color 0.2s;
    }

    .download-btn:hover {
      background: #1e1e1e;
      transform: scale(1.03);             
      box-shadow: 0 10px 18px rgba(0,0,0,0.12);
    }

    .download-btn:hover i {
      color: #ffffff;
    }

    .file-hint {
      margin-top: 1rem;
      color: #9ca3af;
      font-size: 0.85rem;
    }

    
    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem 2.5rem;
      margin: 2.5rem 0 2rem;
    }

    .feature-item {
      text-align: center;
      flex: 0 1 auto;
      min-width: 90px;
    }

    .feature-item i {
      font-size: 2.5rem;
      color: #6b7280;
      margin-bottom: 0.25rem;
    }

    .feature-item span {
      display: block;
      font-size: 1rem;
      color: #1f2937;
      font-weight: 500;
    }

    
    footer {
      text-align: center;
      margin: 2rem 0 1.5rem;
      color: #6b7280;
      border-top: 1px solid #eeeeee;
      padding-top: 1.8rem;
    }

    .github-foot {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f3f4f6;
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
    }

    .github-foot i {
      color: #6b7280;
      font-size: 1.4rem;
    }

    .github-foot a {
      color: #2c2c2c;
      text-decoration: none;
      font-size: 1.1rem;
      border-bottom: 1px dotted transparent;
    }

    .github-foot a:hover {
      border-bottom: 1px dotted #6b7280;
    }

    .copyright {
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: #9ca3af;
    }

    
    @media (max-width: 640px) {
      header {
        padding: 0.8rem 1.2rem;
      }
      .site-name {
        font-size: 1.8rem;
      }
      .header-icon a {
        font-size: 2rem;
      }
      h1 {
        font-size: 2.5rem;
      }
      .tagline {
        font-size: 1rem;
      }
      .download-btn {
        font-size: 1.2rem;
        padding: 0.9rem 2rem;
        width: 100%;
      }
      .features {
        gap: 1.5rem;
      }
      .feature-item i {
        font-size: 2.2rem;
      }
      /* Optional: scale logo on small screens */
      .hero-icon {
        width: 4rem;
      }
    }

    @media (max-width: 380px) {
      .site-name {
        font-size: 1.6rem;
      }
      main {
        padding: 0 1rem;
      }
      .hero-icon {
        width: 3.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="site-name">Sanzu</div>
    <div class="header-icon">
      <a href="https://github.com/heysanzu" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <i class="fab fa-github"></i>
      </a>
    </div>
  </header>

  <main>
    <!-- UPDATED HERO SECTION WITH YOUR LOGO -->
    <div class="hero">
      <img src="sanzu.png" alt="Sanzu Logo" class="hero-icon">
      <h1>Sanzu</h1>
      <div class="tagline">Python notes & IDE</div>
    </div>

    <div class="download-card">
      <div class="version-info">
        <i class="fas fa-tag"></i>
        <span>v1.0</span>
        <span class="free-badge">100% free</span>
      </div>
      <a href="https://drive.google.com/file/d/1orLPmeqdqW0pAjLXqg_LiMZcb59T9zbO/view?usp=sharing" class="download-btn" role="button" aria-label="Download APK">
        <i class="fas fa-download" aria-hidden="true"></i>
        Get APK
      </a>
      <div class="file-hint">
        <i class="fas fa-file"></i> offline · 10 MB
      </div>
    </div>

    <div class="features">
      <div class="feature-item">
        <i class="fas fa-book"></i>
        <span>notes & theory</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-terminal"></i>
        <span>compiler</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-code"></i>
        <span>examples</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-newspaper"></i>
        <span>articles</span>
      </div>
    </div>

    <footer>
      <div class="github-foot">
        <i class="fab fa-github"></i>
        <a href="https://github.com/heysanzu" target="_blank" rel="noopener noreferrer">@heysanzu</a>
      </div>
      <div class="copyright">
        © 2026 Sanzu
      </div>
    </footer>
  </main>
</body>
</html>
